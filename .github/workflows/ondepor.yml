name: OnDepor - Reserva Pádel

on:
  workflow_dispatch:
    inputs:
      socios:
        description: 'Socios separados por coma (ej: Alan Garbo,Gabriel Topor,Damian Potap)'
        required: true
        type: string
      horarios:
        description: 'Horarios preferidos separados por coma (ej: 10:00,09:00)'
        required: true
        type: string
        default: '10:00,09:00'
      fecha:
        description: 'Fecha del turno a reservar YYYY-MM-DD (vacío = mañana)'
        required: false
        type: string
        default: ''
      actividad:
        description: 'Tipo de pádel'
        required: true
        type: choice
        options:
          - DIURNO
          - NOCTURNO
        default: DIURNO
      hora_objetivo:
        description: 'Hora EXACTA Argentina HH:MM en que se habilita la reserva (vacío = ejecuta ya)'
        required: false
        type: string
        default: ''
      fecha_objetivo:
        description: 'Fecha del momento del disparo YYYY-MM-DD (vacío = hoy)'
        required: false
        type: string
        default: ''

jobs:
  reservar-cancha:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 horas (máximo permitido por job en GitHub Actions)
    
    # Forzar Python a no bufferear stdout/stderr.
    # CRÍTICO: sin esto los print() no aparecen en el log de GitHub Actions
    # hasta que termina el proceso, y eso impide debuggear en tiempo real.
    env:
      PYTHONUNBUFFERED: "1"
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps
      
      - name: Mostrar parámetros recibidos
        run: |
          echo "🎾 Parámetros de la reserva:"
          echo "   Socios:         ${{ inputs.socios }}"
          echo "   Horarios:       ${{ inputs.horarios }}"
          echo "   Fecha turno:    ${{ inputs.fecha || 'mañana (default)' }}"
          echo "   Actividad:      ${{ inputs.actividad }}"
          echo "   Hora objetivo:  ${{ inputs.hora_objetivo || '(modo inmediato)' }}"
          echo "   Fecha disparo:  ${{ inputs.fecha_objetivo || 'hoy (default)' }}"
      
      - name: Ejecutar bot de reserva
        env:
          ONDEPOR_USER: ${{ secrets.ONDEPOR_USER }}
          ONDEPOR_PASS: ${{ secrets.ONDEPOR_PASS }}
          ONDEPOR_SOCIOS: ${{ inputs.socios }}
          ONDEPOR_HORARIOS: ${{ inputs.horarios }}
          ONDEPOR_FECHA: ${{ inputs.fecha }}
          ONDEPOR_ACTIVIDAD: ${{ inputs.actividad }}
          ONDEPOR_HORA_OBJETIVO: ${{ inputs.hora_objetivo }}
          ONDEPOR_FECHA_OBJETIVO: ${{ inputs.fecha_objetivo }}
        # -u: unbuffered output (refuerzo además de PYTHONUNBUFFERED)
        run: python -u ondepor_bot.py
      
      - name: Notificar resultado
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Reserva de pádel completada exitosamente"
          else
            echo "❌ Hubo un error en la reserva"
          fi

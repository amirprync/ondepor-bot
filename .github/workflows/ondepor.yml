name: OnDepor - Reserva Pádel

on:
  # Ejecutar automáticamente para reservar:
  # El sistema habilita a las XX:01, así que arrancamos a las XX:55 (5 min antes)
  # para tener margen y estar listos esperando
  # 
  # Sábado 10:00 → Viernes 9:55 (12:55 UTC)
  # Domingo 10:00 → Sábado 9:55 (12:55 UTC)
  schedule:
    # Viernes 9:55 Argentina (12:55 UTC) - para reservar Sábado 10:00
    - cron: '55 12 * * 5'
    # Sábado 9:55 Argentina (12:55 UTC) - para reservar Domingo 10:00
    - cron: '55 12 * * 6'
  
  # También permitir ejecución manual
  workflow_dispatch:

jobs:
  reservar-cancha:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Máximo 20 minutos de ejecución
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps
      
      - name: Ejecutar bot de reserva
        env:
          ONDEPOR_USER: ${{ secrets.ONDEPOR_USER }}
          ONDEPOR_PASS: ${{ secrets.ONDEPOR_PASS }}
          ONDEPOR_SOCIOS: ${{ secrets.ONDEPOR_SOCIOS }}
        run: python ondepor_bot.py
      
      - name: Notificar resultado
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Reserva de pádel completada exitosamente"
          else
            echo "❌ Hubo un error en la reserva"
          fi

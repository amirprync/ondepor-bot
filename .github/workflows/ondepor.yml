name: OnDepor - Reserva Pádel

on:
  # Solo ejecución manual (desde la web o desde la UI de GitHub)
  workflow_dispatch:
    inputs:
      socios:
        description: 'Socios separados por coma (ej: Alan Garbo,Gabriel Topor,Damian Potap)'
        required: true
        type: string
      horarios:
        description: 'Horarios preferidos separados por coma (ej: 10:00,09:00)'
        required: true
        type: string
        default: '10:00,09:00'
      fecha:
        description: 'Fecha a reservar en formato YYYY-MM-DD (vacío = mañana)'
        required: false
        type: string
        default: ''
      actividad:
        description: 'Tipo de pádel'
        required: true
        type: choice
        options:
          - DIURNO
          - NOCTURNO
        default: DIURNO

jobs:
  reservar-cancha:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Máximo 20 minutos de ejecución
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps
      
      - name: Mostrar parámetros recibidos
        run: |
          echo "🎾 Parámetros de la reserva:"
          echo "   Socios:    ${{ inputs.socios }}"
          echo "   Horarios:  ${{ inputs.horarios }}"
          echo "   Fecha:     ${{ inputs.fecha || 'mañana (default)' }}"
          echo "   Actividad: ${{ inputs.actividad }}"
      
      - name: Ejecutar bot de reserva
        env:
          ONDEPOR_USER: ${{ secrets.ONDEPOR_USER }}
          ONDEPOR_PASS: ${{ secrets.ONDEPOR_PASS }}
          ONDEPOR_SOCIOS: ${{ inputs.socios }}
          ONDEPOR_HORARIOS: ${{ inputs.horarios }}
          ONDEPOR_FECHA: ${{ inputs.fecha }}
          ONDEPOR_ACTIVIDAD: ${{ inputs.actividad }}
        run: python ondepor_bot.py
      
      - name: Notificar resultado
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Reserva de pádel completada exitosamente"
          else
            echo "❌ Hubo un error en la reserva"
          fi
